# Formula: openssl
# Cryptography and SSL/TLS toolkit

[package]
name = "openssl"
version = "3.4.4"
description = "Cryptography and SSL/TLS toolkit"
homepage = "https://openssl-library.org"
license = "Apache-2.0"

[source]
url = "https://github.com/openssl/openssl/releases/download/openssl-3.4.4/openssl-3.4.4.tar.gz"
sha256 = "7bdf55ac20f2779e99e5eca306f824fad2b37dee5a06cc35ed5a8b85a6060010"
mirrors = [
    "https://www.openssl.org/source/openssl-3.4.4.tar.gz"
]

[dependencies]
runtime = ["zlib"]
build = ["perl", "make"]

[build]
commands = [
    "./Configure --prefix=$PREFIX --openssldir=$PREFIX/etc/openssl --libdir=lib shared zlib",
    "make -j$NCPU",
    "make install"
]

[build.env]
KERNEL_BITS = "64"
